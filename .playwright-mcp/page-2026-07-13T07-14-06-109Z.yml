  - generic [ref=e1546]:
    - heading "How to Find Cheap Flights" [level=2] [ref=e1548]
    - generic [ref=e1550]:
      - generic [ref=e1552]:
        - heading "Search by Date Range" [level=3] [ref=e1553]
        - paragraph [ref=e1554]: Most flight search engines force you to pick a single date. FlightList lets you search across a range of dates so you can compare prices at a glance and find the cheapest flights available. Even a one-day shift can save you hundreds.
      - generic [ref=e1556]:
        - heading "Search by Country or Region" [level=3] [ref=e1557]
        - paragraph [ref=e1558]: Not set on a specific airport? Search by country or entire region вҖ” like Europe or South East Asia вҖ” to discover cheaper routes you didn't know existed. This is how flexible travelers consistently find the cheapest flights to anywhere.
      - generic [ref=e1560]:
        - heading "Compare One-Way vs Round-Trip" [level=3] [ref=e1561]
        - paragraph [ref=e1562]: Booking two separate one-way flights is often cheaper than a round-trip ticket. FlightList supports both, so you can compare and pick whichever option gives you the lowest total price and the most flexibility.
      - generic [ref=e1564]:
        - heading "Use Filters to Narrow Results" [level=3] [ref=e1565]
        - paragraph [ref=e1566]: Set a maximum budget, choose direct flights only, filter by airline, limit layover time or select your preferred cabin class. The more specific your filters, the faster you'll find cheap flights that match your travel style.
      - generic [ref=e1568]:
        - heading "Be Flexible on Departure Day" [level=3] [ref=e1569]
        - paragraph [ref=e1570]: Flight prices vary dramatically by day of the week. Fridays and mid-week departures tend to be cheapest. Use a wider date range in your search and sort by lowest price to spot the cheapest flights across the entire window.
      - generic [ref=e1572]:
        - heading "Book at the Right Time" [level=3] [ref=e1573]
        - paragraph [ref=e1574]: For domestic flights, booking 1-3 months ahead typically gets you the best fares. For international, aim for 2-6 months out. Searching too early or too late means you'll rarely find the cheapest flights available.
  - generic [ref=e1577]:
    - heading "Cheap Flights вҖ” Frequently Asked Questions" [level=2] [ref=e1579]
    - generic [ref=e1581]:
      - heading "How do I find the cheapest flights?" [level=3] [ref=e1582]
      - paragraph [ref=e1583]: The best way to find cheap flights is to stay flexible on your dates and destination. Use FlightList to search across a date range instead of a single day, and search by country or region to uncover routes you might not have considered. Comparing one-way fares from different airlines often reveals lower prices than a traditional round-trip booking.
      - heading "Is it cheaper to book one-way or round-trip flights?" [level=3] [ref=e1584]
      - paragraph [ref=e1585]: It depends on the route and airline, but booking two one-way flights is often cheaper than a round-trip вҖ” especially when you mix airlines for each leg. Budget carriers like Ryanair, EasyJet and Southwest price their flights as one-way by default, so you can combine the cheapest outbound with the cheapest return for a lower total cost.
      - heading "When is the best time to book cheap flights?" [level=3] [ref=e1586]
      - paragraph [ref=e1587]: For domestic flights, the sweet spot is 1 to 3 months before departure. For international flights, aim for 2 to 6 months ahead. Booking too far in advance or at the last minute typically results in higher fares. Use a date range search to compare prices across several weeks and find the cheapest departure date.
      - heading "What day of the week has the cheapest flights?" [level=3] [ref=e1588]
      - paragraph [ref=e1589]: Flight prices fluctuate by day, but Fridays and mid-week days (Tuesday, Wednesday) tend to have the lowest fares due to reduced business travel demand. The cheapest day varies by route, so searching a full week at once on FlightList lets you spot the best deal quickly.
      - heading "How do I find cheap flights to anywhere?" [level=3] [ref=e1590]
      - paragraph [ref=e1591]: On FlightList, enter your departure city and leave the destination open or set it to an entire region like Europe, Asia, or South America. Sort results by lowest price and you'll see the cheapest flights available from your location across all destinations. This is how digital nomads and flexible travelers discover affordable routes they wouldn't have found otherwise.

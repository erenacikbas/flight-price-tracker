<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flight Price Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1420; --card: #182130; --muted: #8b98ac; --text: #e8edf4;
    --accent: #4f9dff; --up: #ff6b6b; --down: #35d0a5; --border: #263042;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); padding: 28px 20px 60px;
  }
  header { max-width: 1080px; margin: 0 auto 22px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; margin-bottom: 26px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card .route { font-size: 13px; color: var(--muted); letter-spacing: .04em; }
  .card .price { font-size: 28px; font-weight: 650; margin: 6px 0 2px; }
  .card .meta { font-size: 12px; color: var(--muted); }
  .chg { font-size: 12px; font-weight: 600; }
  .chg.up { color: var(--up); } .chg.down { color: var(--down); } .chg.flat { color: var(--muted); }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 22px; }
  .panel h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }
  canvas { width: 100% !important; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .controls button { background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; }
  .controls button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  footer { max-width: 1080px; margin: 20px auto 0; color: var(--muted); font-size: 12px; }
  a { color: var(--accent); }
  .err { color: var(--up); }

  .signal { background: var(--card); border: 1px solid var(--border); border-left-width: 5px;
    border-radius: 12px; padding: 18px 20px; margin-bottom: 22px; }
  .signal.buy   { border-left-color: var(--down); }
  .signal.good  { border-left-color: #7ee787; }
  .signal.hold  { border-left-color: var(--accent); }
  .signal.wait  { border-left-color: var(--up); }
  .signal .verdict { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; color: #0f1420; }
  .badge.buy { background: var(--down); } .badge.good { background: #7ee787; }
  .badge.hold { background: var(--accent); color:#fff; } .badge.wait { background: var(--up); }
  .signal .why { color: var(--text); font-size: 14px; margin-top: 8px; line-height: 1.5; }
  .stats { display: flex; flex-wrap: wrap; gap: 22px; margin-top: 14px; }
  .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .stat .v { font-size: 18px; font-weight: 650; }
  .gauge { height: 8px; border-radius: 6px; margin-top: 12px;
    background: linear-gradient(90deg, var(--down), #ffb454, var(--up)); position: relative; }
  .gauge .mark { position: absolute; top: -4px; width: 3px; height: 16px; background: #fff; border-radius: 2px;
    box-shadow: 0 0 0 2px rgba(0,0,0,.35); }
  .gauge-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>✈️ Flight Price Tracker</h1>
  <div class="sub" id="updated">Loading…</div>
</header>

<div class="wrap">
  <div id="signal"></div>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>Price over time</h2>
    <div class="controls" id="range"></div>
    <canvas id="chart" height="120"></canvas>
  </div>

  <div class="panel">
    <h2>Latest snapshot</h2>
    <div style="overflow-x:auto">
      <table id="table" style="width:100%; border-collapse:collapse; font-size:13px"></table>
    </div>
  </div>
</div>

<footer>
  Data logged every ~15 min via GitHub Actions · source: Google Flights (fast-flights) ·
  <span id="count"></span>
</footer>

<script>
const CSV_URL = "./data/prices.csv?_=" + Date.now(); // cache-bust each load
const COLORS = ["#4f9dff","#35d0a5","#ffb454","#ff6b6b","#b48cff","#7ee787","#f778ba","#79c0ff"];

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const head = lines[0].split(",");
  return lines.slice(1).filter(Boolean).map(line => {
    // simple CSV: our fields never contain commas except airline; handle quoted safely enough
    const cells = splitCsvLine(line);
    const o = {};
    head.forEach((h, i) => o[h] = cells[i] ?? "");
    return o;
  });
}
function splitCsvLine(line) {
  const out = []; let cur = ""; let q = false;
  for (const ch of line) {
    if (ch === '"') q = !q;
    else if (ch === "," && !q) { out.push(cur); cur = ""; }
    else cur += ch;
  }
  out.push(cur); return out;
}

let RAW = [], BYROUTE = {}, chart, rangeHours = 0;

function money(v, cur) {
  const sym = {EUR:"€", USD:"$", GBP:"£", TRY:"₺"}[cur] || (cur + " ");
  return sym + Number(v).toLocaleString();
}

function build() {
  BYROUTE = {};
  for (const r of RAW) {
    if (!r.cheapest_price) continue;
    (BYROUTE[r.route_id] ??= []).push({
      t: new Date(r.timestamp_utc),
      price: +r.cheapest_price,
      cur: r.currency,
      airline: r.cheapest_airline,
      origin: r.origin, destination: r.destination,
      depart: r.depart_date, ret: r.return_date, trip: r.trip,
    });
  }
  for (const k in BYROUTE) BYROUTE[k].sort((a,b) => a.t - b.t);
  renderSignal(); renderCards(); renderChart(); renderTable();
}

function quantile(sorted, q) {
  const pos = (sorted.length - 1) * q;
  const base = Math.floor(pos), rest = pos - base;
  return sorted[base + 1] !== undefined
    ? sorted[base] + rest * (sorted[base + 1] - sorted[base])
    : sorted[base];
}

function analyze(series) {
  const prices = series.map(p => p.price);
  const sorted = [...prices].sort((a, b) => a - b);
  const cur = prices[prices.length - 1];
  const min = sorted[0], max = sorted[sorted.length - 1];
  const median = quantile(sorted, 0.5), p25 = quantile(sorted, 0.25);
  // percentile rank of current price (0 = cheapest seen, 100 = priciest seen)
  const below = prices.filter(p => p < cur).length;
  const pct = Math.round((below / prices.length) * 100);
  const last = series[series.length - 1];
  const daysToDep = last.depart
    ? Math.round((new Date(last.depart) - new Date()) / 86400e3) : null;

  // --- verdict engine ---
  let key = "hold", verdict = "Hold", why = [];
  if (cur <= min * 1.02) { key = "buy"; verdict = "Buy now"; why.push(`Current fare is at/near the lowest observed (${money(min, last.cur)}).`); }
  else if (pct <= 25) { key = "good"; verdict = "Good price"; why.push(`Cheaper than ${100 - pct}% of readings so far.`); }
  else if (pct >= 75) { key = "wait"; verdict = "Wait"; why.push(`Pricier than ${pct}% of readings — likely to come back down.`); }
  else { key = "hold"; verdict = "Hold"; why.push(`Around the typical level (${pct}th percentile of what we've seen).`); }

  // departure-proximity override: close-in fares usually climb
  if (daysToDep !== null && daysToDep <= 21 && cur <= median) {
    key = "buy"; verdict = "Buy now";
    why.push(`Only ${daysToDep} days to departure — close-in fares usually rise, and this is at/under the median.`);
  }

  // booking-window context (Asia/Oceania sweet spot ≈ 60–180 days out)
  if (daysToDep !== null) {
    if (daysToDep > 180) why.push(`${daysToDep} days out — a little early; the cheapest fares for Asia routes usually land ~2–6 months before departure, so keep watching for dips.`);
    else if (daysToDep >= 60) why.push(`${daysToDep} days out — inside the ideal 2–6 month booking window for Asia routes. Act decisively on dips.`);
    else why.push(`${daysToDep} days out — past the ideal window; fares tend to trend up from here, so grab a good dip rather than holding out.`);
  }

  return { cur, min, max, median, p25, pct, daysToDep, key, verdict,
           why: why.join(" "), cur_label: last.cur,
           savingVsMax: max - cur, savingVsFirst: series[0].price - cur };
}

function renderSignal() {
  const el = document.getElementById("signal");
  el.innerHTML = "";
  for (const [rid, s] of Object.entries(BYROUTE)) {
    if (s.length < 2) continue;
    const a = analyze(s);
    const gaugePos = a.max === a.min ? 50 : ((a.cur - a.min) / (a.max - a.min)) * 100;
    el.innerHTML += `
      <div class="signal ${a.key}">
        <div class="verdict">
          <span class="badge ${a.key}">${a.verdict.toUpperCase()}</span>
          ${s[0].origin} → ${s[0].destination}
          <span style="font-weight:400;color:var(--muted);font-size:14px">· now ${money(a.cur, a.cur_label)}</span>
        </div>
        <div class="why">${a.why}</div>
        <div class="stats">
          <div class="stat"><div class="k">Current</div><div class="v">${money(a.cur, a.cur_label)}</div></div>
          <div class="stat"><div class="k">Lowest seen</div><div class="v" style="color:var(--down)">${money(a.min, a.cur_label)}</div></div>
          <div class="stat"><div class="k">Median</div><div class="v">${money(Math.round(a.median), a.cur_label)}</div></div>
          <div class="stat"><div class="k">Highest seen</div><div class="v" style="color:var(--up)">${money(a.max, a.cur_label)}</div></div>
          <div class="stat"><div class="k">Vs. highest</div><div class="v" style="color:var(--down)">${a.savingVsMax > 0 ? "save " + money(a.savingVsMax, a.cur_label) : "—"}</div></div>
          <div class="stat"><div class="k">Days to departure</div><div class="v">${a.daysToDep ?? "—"}</div></div>
        </div>
        <div class="gauge"><div class="mark" style="left:calc(${gaugePos.toFixed(0)}% - 1px)"></div></div>
        <div class="gauge-labels"><span>cheapest ${money(a.min, a.cur_label)}</span><span>priciest ${money(a.max, a.cur_label)}</span></div>
      </div>`;
  }
}

function filtered(series) {
  if (!rangeHours) return series;
  const cutoff = Date.now() - rangeHours * 3600e3;
  return series.filter(p => p.t.getTime() >= cutoff);
}

function renderCards() {
  const el = document.getElementById("cards");
  el.innerHTML = "";
  for (const [rid, s] of Object.entries(BYROUTE)) {
    const last = s[s.length - 1];
    const prev = s.length > 1 ? s[s.length - 2] : null;
    const prices = s.map(p => p.price);
    const min = Math.min(...prices), max = Math.max(...prices);
    let chg = "", cls = "flat";
    if (prev) {
      const d = last.price - prev.price;
      cls = d > 0 ? "up" : d < 0 ? "down" : "flat";
      chg = (d > 0 ? "▲ +" : d < 0 ? "▼ " : "● ") + money(Math.abs(d), last.cur) + " vs prev";
    }
    const isLow = last.price === min;
    el.innerHTML += `
      <div class="card">
        <div class="route">${last.origin} → ${last.destination} · ${last.trip}</div>
        <div class="price">${money(last.price, last.cur)}</div>
        <div class="chg ${cls}">${chg || "—"}</div>
        <div class="meta" style="margin-top:8px">
          ${last.airline || ""}<br>
          low ${money(min,last.cur)} · high ${money(max,last.cur)}
          ${isLow ? ' · <span style="color:var(--down)">at lowest</span>' : ''}
        </div>
      </div>`;
  }
}

function renderChart() {
  const ctx = document.getElementById("chart");
  const datasets = Object.entries(BYROUTE).map(([rid, s], i) => {
    const f = filtered(s);
    return {
      label: rid,
      data: f.map(p => ({ x: p.t, y: p.price })),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length],
      tension: 0.25, pointRadius: 2, borderWidth: 2, stepped: false,
    };
  });
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "line",
    data: { datasets },
    options: {
      responsive: true, interaction: { mode: "nearest", intersect: false },
      scales: {
        x: { type: "time", time: { unit: rangeHours && rangeHours <= 48 ? "hour" : "day" },
             ticks: { color: "#8b98ac" }, grid: { color: "#1e2a3d" } },
        y: { ticks: { color: "#8b98ac" }, grid: { color: "#1e2a3d" } },
      },
      plugins: { legend: { labels: { color: "#e8edf4" } } },
    },
  });
}

function renderTable() {
  const rows = Object.values(BYROUTE).map(s => s[s.length - 1]);
  const t = document.getElementById("table");
  t.innerHTML = `<tr style="text-align:left;color:var(--muted)">
    <th style="padding:6px 10px">Route</th><th>Depart</th><th>Trip</th>
    <th>Latest</th><th>Airline</th><th>Last logged (UTC)</th></tr>` +
    rows.map(r => `<tr style="border-top:1px solid var(--border)">
      <td style="padding:6px 10px">${r.origin}→${r.destination}</td>
      <td>${r.depart}${r.ret ? " / " + r.ret : ""}</td>
      <td>${r.trip}</td>
      <td><b>${money(r.price, r.cur)}</b></td>
      <td>${r.airline || ""}</td>
      <td>${r.t.toISOString().slice(0,16).replace("T"," ")}</td>
    </tr>`).join("");
}

function renderRangeButtons() {
  const defs = [[0,"All"],[24,"24h"],[72,"3d"],[168,"7d"]];
  const el = document.getElementById("range");
  el.innerHTML = "";
  for (const [h, label] of defs) {
    const b = document.createElement("button");
    b.textContent = label; b.className = h === rangeHours ? "active" : "";
    b.onclick = () => { rangeHours = h; renderRangeButtons(); renderChart(); };
    el.appendChild(b);
  }
}

async function load() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    RAW = parseCSV(await res.text());
    if (!RAW.length) throw new Error("No data yet — waiting for the first logging run.");
    const last = RAW[RAW.length - 1].timestamp_utc.replace("T"," ").replace("Z"," UTC");
    document.getElementById("updated").textContent = "Last data point: " + last;
    document.getElementById("count").textContent = RAW.length + " data points";
    renderRangeButtons();
    build();
  } catch (e) {
    document.getElementById("updated").innerHTML =
      '<span class="err">' + e.message + '</span>';
  }
}
load();
</script>
</body>
</html>

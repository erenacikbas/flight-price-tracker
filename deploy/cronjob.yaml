apiVersion: batch/v1
kind: CronJob
metadata:
  name: flight-logger
  namespace: flight-tracker
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      ttlSecondsAfterFinished: 3600   # auto-delete finished jobs+pods after 1h
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: logger
              # Pinned by digest for reproducible rollbacks. To adopt a new build:
              # after CI pushes, run `crane digest ghcr.io/erenacikbas/flight-tracker-logger:latest`
              # (or read a seed pod's .status.containerStatuses[].imageID) and paste the sha256 here.
              image: ghcr.io/erenacikbas/flight-tracker-logger@sha256:425ac6b799da6c34acdeacc9d65d8b36b344b2e9ae39feb546c3f4ec6596c598
              env:
                - { name: INFLUXDB_URL, value: "http://influxdb.flight-tracker:8086" }
                - { name: INFLUXDB_ORG, value: flights }
                - { name: INFLUXDB_BUCKET, value: flight_prices }
                - { name: ROUTES_PATH, value: /config/routes.json }
                - name: INFLUXDB_TOKEN
                  valueFrom: { secretKeyRef: { name: flight-tracker-secrets, key: influxdb-token } }
              volumeMounts:
                - { name: routes, mountPath: /config }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 500m, memory: 256Mi }
          volumes:
            - name: routes
              configMap: { name: flight-tracker-routes }

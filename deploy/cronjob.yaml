apiVersion: batch/v1
kind: CronJob
metadata:
  name: flight-logger
  namespace: flight-tracker
spec:
  schedule: "7 * * * *"          # hourly (off :00) — a full browser sweep of 9 dates takes several minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1200
      ttlSecondsAfterFinished: 3600   # auto-delete finished jobs+pods after 1h
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: logger
              image: ghcr.io/erenacikbas/flight-tracker-logger:latest
              env:
                - { name: INFLUXDB_URL, value: "http://influxdb.flight-tracker:8086" }
                - { name: INFLUXDB_ORG, value: flights }
                - { name: INFLUXDB_BUCKET, value: flight_prices }
                - { name: ROUTES_PATH, value: /config/routes.json }
                - name: INFLUXDB_TOKEN
                  valueFrom: { secretKeyRef: { name: flight-tracker-secrets, key: influxdb-token } }
              volumeMounts:
                - { name: routes, mountPath: /config }
                - { name: dshm, mountPath: /dev/shm }
              resources:
                requests: { cpu: 250m, memory: 512Mi }
                limits: { cpu: "1", memory: 2Gi }
          volumes:
            - name: routes
              configMap: { name: flight-tracker-routes }
            - name: dshm
              emptyDir: { medium: Memory, sizeLimit: 512Mi }

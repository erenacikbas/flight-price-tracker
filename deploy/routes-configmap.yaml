apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-tracker-routes
  namespace: flight-tracker
data:
  routes.json: |
    {
      "currency": "TRY",
      "cabin": "economy",
      "adults": 2,
      "limit": 400,
      "max_stopovers": 10,
      "routes": [
        { "id": "IST-DPS", "origin": "IST", "destination": "DPS", "trip": "one-way",
          "fly_from": "city:IST", "fly_to": "city:DPS", "alert_target": 32000,
          "date_range": { "start": "2026-10-24", "end": "2026-11-01" } },
        { "id": "BJV-ESB", "origin": "BJV", "destination": "ESB", "trip": "one-way",
          "fly_from": "city:BJV", "fly_to": "city:ANK", "max_stopovers": 2, "alert_target": 2900,
          "date_range": { "start": "2026-08-01", "end": "2026-08-31" } },
        { "id": "ESB-DPS", "origin": "ESB", "destination": "DPS", "trip": "one-way",
          "fly_from": "city:ANK", "fly_to": "city:DPS", "max_stopovers": 4, "alert_target": 36000,
          "date_range": { "start": "2026-10-24", "end": "2026-11-01" } },
        { "id": "IST-BKK", "origin": "IST", "destination": "BKK", "trip": "one-way",
          "fly_from": "city:IST", "fly_to": "city:BKK", "alert_target": 21000,
          "date_range": { "start": "2026-10-24", "end": "2026-11-01" } },
        { "id": "ESB-BKK", "origin": "ESB", "destination": "BKK", "trip": "one-way",
          "fly_from": "city:ANK", "fly_to": "city:BKK", "max_stopovers": 4, "alert_target": 26000,
          "date_range": { "start": "2026-10-24", "end": "2026-11-01" } }
      ]
    }

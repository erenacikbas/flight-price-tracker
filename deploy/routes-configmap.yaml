apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-tracker-routes
  namespace: flight-tracker
data:
  routes.json: |
    {
      "currency": "TRY",
      "cabin": "economy",
      "adults": 2,
      "limit": 400,
      "max_stopovers": 10,
      "routes": [
        { "id": "IST-DPS", "origin": "IST", "destination": "DPS", "trip": "one-way",
          "fly_from": "city:IST", "fly_to": "city:DPS",
          "date_range": { "start": "2026-10-24", "end": "2026-11-01" } }
      ]
    }

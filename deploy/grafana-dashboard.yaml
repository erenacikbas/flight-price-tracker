apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flights
  namespace: grafana
data:
  flights.json: |
    {
      "title": "Flight Prices",
      "uid": "flight-prices",
      "schemaVersion": 39,
      "time": { "from": "now-7d", "to": "now" },
      "refresh": "30m",
      "templating": {
        "list": [
          { "name": "try_per_eur", "type": "textbox", "label": "TRY per EUR", "query": "53", "current": { "text": "53", "value": "53" } }
        ]
      },
      "panels": [
        {
          "type": "barchart",
          "title": "Cheapest fare by departure day (TRY, 2 adults)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "currencyTRY", "decimals": 0 } },
          "options": { "xField": "depart_date", "orientation": "vertical", "showValue": "always" },
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"depart_date\"]) |> min()\n  |> group()\n  |> keep(columns: [\"depart_date\", \"_value\"])\n  |> rename(columns: { _value: \"price\" })\n  |> sort(columns: [\"depart_date\"])"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest fare now (TRY, 2 adults)",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 10 },
          "fieldConfig": { "defaults": { "unit": "currencyTRY", "decimals": 0 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group() |> min()"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest now (EUR @ ${try_per_eur})",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 10 },
          "fieldConfig": { "defaults": { "unit": "currencyEUR", "decimals": 0 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group() |> min()\n  |> map(fn: (r) => ({ r with _value: float(v: r._value) / float(v: ${try_per_eur}) }))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Days to departure (nearest tracked)",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 10 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"days_to_departure\")\n  |> group() |> min()"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Cheapest-fare trend by departure day (TRY, 2 adults)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "currencyTRY", "custom": { "drawStyle": "line", "showPoints": "auto", "spanNulls": true } },
            "overrides": [ { "matcher": { "id": "byFrameRefID", "options": "A" }, "properties": [ { "id": "displayName", "value": "${__field.labels.depart_date}" } ] } ]
          },
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["last", "min"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\"])\n  |> aggregateWindow(every: 1h, fn: min, createEmpty: false)"
            }
          ]
        },
        {
          "type": "table",
          "title": "All fares by day & airline (cheapest first, 2 adults)",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 26 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "price" }, "properties": [ { "id": "unit", "value": "currencyTRY" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "Price (TRY, 2 adults)" } ] },
              { "matcher": { "id": "byName", "options": "booking_url" }, "properties": [ { "id": "displayName", "value": "Book" }, { "id": "links", "value": [ { "title": "Open on Google Flights", "url": "${__value.text}", "targetBlank": true } ] } ] }
            ]
          },
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and (r._field == \"price\" or r._field == \"stops\"))\n  |> last()\n  |> keep(columns: [\"depart_date\", \"airline\", \"booking_url\", \"_field\", \"_value\"])\n  |> pivot(rowKey: [\"depart_date\", \"airline\", \"booking_url\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> group()\n  |> sort(columns: [\"price\"])"
            }
          ]
        }
      ]
    }

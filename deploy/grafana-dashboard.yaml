apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flights
  namespace: grafana
data:
  flights.json: |
    {
      "title": "Flight Prices",
      "uid": "flight-prices",
      "schemaVersion": 39,
      "time": { "from": "now-30d", "to": "now" },
      "refresh": "15m",
      "templating": {
        "list": [
          {
            "name": "try_per_eur",
            "type": "textbox",
            "label": "TRY per EUR",
            "query": "53",
            "current": { "text": "53", "value": "53" }
          },
          {
            "name": "pax",
            "type": "textbox",
            "label": "Passengers",
            "query": "1",
            "current": { "text": "1", "value": "1" }
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Price by airline over time (TRY, ${pax} pax)",
          "gridPos": { "h": 11, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "currencyTRY", "custom": { "drawStyle": "line", "showPoints": "auto", "spanNulls": true } },
            "overrides": [
              { "matcher": { "id": "byFrameRefID", "options": "A" },
                "properties": [ { "id": "displayName", "value": "${__field.labels.airline}" } ] }
            ]
          },
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["last", "min", "max"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"airline\"])\n  |> aggregateWindow(every: 15m, fn: min, createEmpty: false)\n  |> map(fn: (r) => ({ r with _value: float(v: r._value) * float(v: ${pax}) }))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest now (TRY)",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 11 },
          "fieldConfig": { "defaults": { "unit": "currencyTRY", "decimals": 0 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -6h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"airline\"]) |> last()\n  |> group() |> min()\n  |> map(fn: (r) => ({ r with _value: float(v: r._value) * float(v: ${pax}) }))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest now (EUR @ ${try_per_eur})",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 11 },
          "fieldConfig": { "defaults": { "unit": "currencyEUR", "decimals": 0 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -6h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"airline\"]) |> last()\n  |> group() |> min()\n  |> map(fn: (r) => ({ r with _value: float(v: r._value) * float(v: ${pax}) / float(v: ${try_per_eur}) }))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest airline now",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 11 },
          "fieldConfig": { "defaults": { "unit": "currencyTRY", "decimals": 0 } },
          "options": { "reduceOptions": { "calcs": ["last"], "fields": "/^_value$/" }, "textMode": "value_and_name" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -6h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"airline\"]) |> last()\n  |> group() |> min()\n  |> map(fn: (r) => ({ _value: float(v: r._value) * float(v: ${pax}), airline: r.airline }))\n  |> rename(columns: { airline: \"_field\" })"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Days to departure",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 11 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -6h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"days_to_departure\")\n  |> group() |> last()"
            }
          ]
        },
        {
          "type": "table",
          "title": "Current price by airline (cheapest first, ${pax} pax)",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 17 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "TRY" }, "properties": [ { "id": "unit", "value": "currencyTRY" }, { "id": "decimals", "value": 0 } ] },
              { "matcher": { "id": "byName", "options": "EUR" }, "properties": [ { "id": "unit", "value": "currencyEUR" }, { "id": "decimals", "value": 0 } ] }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -6h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"airline\"]) |> last()\n  |> group()\n  |> map(fn: (r) => ({ airline: r.airline, TRY: float(v: r._value) * float(v: ${pax}), EUR: float(v: r._value) * float(v: ${pax}) / float(v: ${try_per_eur}) }))\n  |> sort(columns: [\"TRY\"])"
            }
          ]
        }
      ]
    }

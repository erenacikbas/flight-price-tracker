apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flights
  namespace: grafana
data:
  flights.json: |
    {
      "title": "Flight Prices",
      "uid": "flight-prices",
      "schemaVersion": 39,
      "time": { "from": "now-7d", "to": "now" },
      "refresh": "15m",
      "templating": {
        "list": [
          {
            "name": "route",
            "type": "query",
            "label": "Route",
            "datasource": { "type": "influxdb", "uid": "influxdb" },
            "query": "import \"influxdata/influxdb/schema\"\nschema.tagValues(bucket: \"flight_prices\", tag: \"route_id\")",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false,
            "current": { "text": "IST-DPS", "value": "IST-DPS" }
          },
          { "name": "try_per_eur", "type": "textbox", "label": "TRY per EUR", "query": "53", "current": { "text": "53", "value": "53" } }
        ]
      },
      "panels": [
        {
          "type": "barchart",
          "title": "${route} — cheapest fare by departure day (TRY, 2 adults)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "currencyTRY", "decimals": 0 } },
          "options": { "xField": "day", "orientation": "auto", "showValue": "auto", "xTickLabelRotation": -45, "xTickLabelSpacing": 100 },
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "import \"strings\"\nfrom(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"depart_date\"]) |> min()\n  |> group()\n  |> sort(columns: [\"depart_date\"])\n  |> map(fn: (r) => ({ day: strings.substring(v: r.depart_date, start: 5, end: 10), price: r._value }))\n  |> keep(columns: [\"day\", \"price\"])"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest fare now (TRY, 2 adults)",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 10 },
          "fieldConfig": { "defaults": { "unit": "currencyTRY", "decimals": 0 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group() |> min()"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest now (EUR @ ${try_per_eur})",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 10 },
          "fieldConfig": { "defaults": { "unit": "currencyEUR", "decimals": 0 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group() |> min()\n  |> map(fn: (r) => ({ r with _value: float(v: r._value) / float(v: ${try_per_eur}) }))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Days to departure (nearest tracked)",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 10 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"days_to_departure\")\n  |> group() |> min()"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "${route} — cheapest-fare trend by departure day (TRY, 2 adults)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "currencyTRY", "custom": { "drawStyle": "line", "showPoints": "auto", "spanNulls": true } },
            "overrides": [ { "matcher": { "id": "byFrameRefID", "options": "A" }, "properties": [ { "id": "displayName", "value": "${__field.labels.depart_date}" } ] } ]
          },
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["last", "min"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\"])\n  |> aggregateWindow(every: 1h, fn: min, createEmpty: false)"
            }
          ]
        },
        {
          "type": "table",
          "title": "${route} — all fares by day & airline (cheapest first, 2 adults)",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 26 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "depart_date" }, "properties": [ { "id": "displayName", "value": "Date" } ] },
              { "matcher": { "id": "byName", "options": "origin" }, "properties": [ { "id": "displayName", "value": "From" } ] },
              { "matcher": { "id": "byName", "options": "destination" }, "properties": [ { "id": "displayName", "value": "To" } ] },
              { "matcher": { "id": "byName", "options": "airline" }, "properties": [ { "id": "displayName", "value": "Airline(s)" } ] },
              { "matcher": { "id": "byName", "options": "stops" }, "properties": [ { "id": "displayName", "value": "Stops" } ] },
              { "matcher": { "id": "byName", "options": "price" }, "properties": [ { "id": "unit", "value": "currencyTRY" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "Price (TRY, 2 adults)" } ] },
              { "matcher": { "id": "byName", "options": "booking_url" }, "properties": [ { "id": "displayName", "value": "Book" }, { "id": "links", "value": [ { "title": "Book on Kiwi", "url": "${__value.text}", "targetBlank": true } ] } ] }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "indexByName": { "depart_date": 0, "origin": 1, "destination": 2, "airline": 3, "stops": 4, "price": 5, "booking_url": 6 } } }
          ],
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and (r._field == \"price\" or r._field == \"stops\"))\n  |> last()\n  |> keep(columns: [\"depart_date\", \"airline\", \"origin\", \"destination\", \"booking_url\", \"_field\", \"_value\"])\n  |> pivot(rowKey: [\"depart_date\", \"airline\", \"origin\", \"destination\", \"booking_url\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> group()\n  |> sort(columns: [\"price\"])"
            }
          ]
        },
        {
          "type": "table",
          "title": "${route} — cheapest days ranked (green = cheapest)",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 40 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "depart_date" }, "properties": [ { "id": "displayName", "value": "Date" } ] },
              { "matcher": { "id": "byName", "options": "airline" }, "properties": [ { "id": "displayName", "value": "Cheapest airline(s)" } ] },
              { "matcher": { "id": "byName", "options": "price" }, "properties": [
                  { "id": "unit", "value": "currencyTRY" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "Cheapest (TRY, 2 adults)" },
                  { "id": "custom.cellOptions", "value": { "type": "color-background", "mode": "gradient" } },
                  { "id": "color", "value": { "mode": "continuous-GrYlRd" } }
              ] }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "indexByName": { "depart_date": 0, "airline": 1, "price": 2 } } }
          ],
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"depart_date\"]) |> min()\n  |> group()\n  |> keep(columns: [\"depart_date\", \"airline\", \"_value\"])\n  |> rename(columns: { _value: \"price\" })\n  |> sort(columns: [\"price\"])"
            }
          ]
        }
      ]
    }

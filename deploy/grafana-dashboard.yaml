apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flights
  namespace: grafana
data:
  flights.json: |
    {
      "title": "Flight Prices",
      "uid": "flight-prices",
      "schemaVersion": 39,
      "time": { "from": "now-7d", "to": "now" },
      "refresh": "15m",
      "templating": {
        "list": [
          {
            "name": "route",
            "type": "query",
            "label": "Route",
            "datasource": { "type": "influxdb", "uid": "influxdb" },
            "query": "from(bucket: \"flight_prices\")\n  |> range(start: -7d)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> keep(columns: [\"route_id\"])\n  |> group()\n  |> distinct(column: \"route_id\")",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false,
            "current": { "text": "IST-DPS", "value": "IST-DPS" }
          },
          { "name": "try_per_eur", "type": "textbox", "label": "TRY per EUR", "query": "53", "current": { "text": "53", "value": "53" } }
        ]
      },
      "panels": [
        {
          "type": "barchart",
          "title": "${route} — cheapest fare by departure day (TRY, 2 adults)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 6 },
          "fieldConfig": { "defaults": { "unit": "suffix: ₺", "decimals": 0 } },
          "options": { "xField": "day", "orientation": "auto", "showValue": "auto", "xTickLabelRotation": -45, "xTickLabelSpacing": 100 },
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "import \"strings\"\nfrom(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"depart_date\"]) |> min()\n  |> group()\n  |> sort(columns: [\"depart_date\"])\n  |> map(fn: (r) => ({ day: strings.substring(v: r.depart_date, start: 5, end: 10), price: r._value }))\n  |> keep(columns: [\"day\", \"price\"])"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest fare now (TRY, 2 adults)",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "suffix: ₺", "decimals": 0 } },
          "options": { "textMode": "value", "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group() |> min()"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Cheapest now (EUR @ ${try_per_eur})",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "prefix: €", "decimals": 0 } },
          "options": { "textMode": "value", "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group() |> min()\n  |> map(fn: (r) => ({ r with _value: float(v: r._value) / float(v: ${try_per_eur}) }))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Days to departure (nearest tracked)",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "textMode": "value", "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"days_to_departure\")\n  |> group() |> min()"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Now vs tracked low (0% = best seen)",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent", "decimals": 1,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 3 }, { "color": "orange", "value": 10 }, { "color": "red", "value": 20 } ] }
            }
          },
          "options": { "textMode": "value", "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "base = from(bucket: \"flight_prices\")\n  |> range(start: -60d)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"_time\"]) |> min() |> group() |> keep(columns: [\"_time\", \"_value\"])\nlo = base |> min() |> set(key: \"g\", value: \"x\") |> set(key: \"k\", value: \"lo\") |> keep(columns: [\"g\", \"k\", \"_value\"])\ncur = base |> last() |> set(key: \"g\", value: \"x\") |> set(key: \"k\", value: \"cur\") |> keep(columns: [\"g\", \"k\", \"_value\"])\nunion(tables: [lo, cur]) |> pivot(rowKey: [\"g\"], columnKey: [\"k\"], valueColumn: \"_value\") |> map(fn: (r) => ({ _value: (float(v: r.cur) - float(v: r.lo)) / float(v: r.lo) * 100.0 }))"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "${route} — cheapest-fare trend by departure day (TRY, 2 adults)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "unit": "suffix: ₺", "custom": { "drawStyle": "line", "showPoints": "auto", "spanNulls": true } },
            "overrides": [ { "matcher": { "id": "byFrameRefID", "options": "A" }, "properties": [ { "id": "displayName", "value": "${__field.labels.depart_date}" } ] } ]
          },
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["last", "min"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\"])\n  |> aggregateWindow(every: 1h, fn: min, createEmpty: false)"
            }
          ]
        },
        {
          "type": "table",
          "title": "${route} — all fares by day & airline (cheapest first, 2 adults)",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 26 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "depart_date" }, "properties": [ { "id": "displayName", "value": "Date" } ] },
              { "matcher": { "id": "byName", "options": "origin" }, "properties": [ { "id": "displayName", "value": "From" } ] },
              { "matcher": { "id": "byName", "options": "destination" }, "properties": [ { "id": "displayName", "value": "To" } ] },
              { "matcher": { "id": "byName", "options": "airline" }, "properties": [ { "id": "displayName", "value": "Airline(s)" } ] },
              { "matcher": { "id": "byName", "options": "stops" }, "properties": [ { "id": "displayName", "value": "Stops" } ] },
              { "matcher": { "id": "byName", "options": "depart_time" }, "properties": [ { "id": "displayName", "value": "Depart" } ] },
              { "matcher": { "id": "byName", "options": "duration_min" }, "properties": [ { "id": "unit", "value": "m" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "Duration" } ] },
              { "matcher": { "id": "byName", "options": "bag_price" }, "properties": [ { "id": "unit", "value": "suffix: ₺" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "+1 checked bag" } ] },
              { "matcher": { "id": "byName", "options": "airline_logo" }, "properties": [ { "id": "displayName", "value": "Logo" }, { "id": "custom.cellOptions", "value": { "type": "image" } }, { "id": "custom.width", "value": 64 } ] },
              { "matcher": { "id": "byName", "options": "price" }, "properties": [ { "id": "unit", "value": "currencyTRY" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "Price (TRY, 2 adults)" } ] },
              { "matcher": { "id": "byName", "options": "booking_url" }, "properties": [ { "id": "displayName", "value": "Book" }, { "id": "links", "value": [ { "title": "Book on Kiwi", "url": "${__value.text}", "targetBlank": true } ] } ] }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "indexByName": { "airline_logo": 0, "depart_date": 1, "depart_time": 2, "origin": 3, "destination": 4, "airline": 5, "stops": 6, "duration_min": 7, "price": 8, "bag_price": 9, "booking_url": 10 } } }
          ],
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and (r._field == \"price\" or r._field == \"stops\" or r._field == \"duration_min\" or r._field == \"bag_price\"))\n  |> group(columns: [\"depart_date\", \"airline\", \"depart_time\", \"origin\", \"destination\", \"booking_url\", \"_field\"])\n  |> last()\n  |> group()\n  |> map(fn: (r) => ({ r with airline_logo: if exists r.airline_logo then r.airline_logo else \"\" }))\n  |> keep(columns: [\"depart_date\", \"airline\", \"airline_logo\", \"depart_time\", \"origin\", \"destination\", \"booking_url\", \"_field\", \"_value\"])\n  |> pivot(rowKey: [\"depart_date\", \"airline\", \"airline_logo\", \"depart_time\", \"origin\", \"destination\", \"booking_url\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> sort(columns: [\"price\"])"
            }
          ]
        },
        {
          "type": "table",
          "title": "${route} — cheapest days ranked (green = cheapest)",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 40 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "depart_date" }, "properties": [ { "id": "displayName", "value": "Date" } ] },
              { "matcher": { "id": "byName", "options": "airline" }, "properties": [ { "id": "displayName", "value": "Cheapest airline(s)" } ] },
              { "matcher": { "id": "byName", "options": "airline_logo" }, "properties": [ { "id": "displayName", "value": "Logo" }, { "id": "custom.cellOptions", "value": { "type": "image" } }, { "id": "custom.width", "value": 64 } ] },
              { "matcher": { "id": "byName", "options": "price" }, "properties": [
                  { "id": "unit", "value": "currencyTRY" }, { "id": "decimals", "value": 0 }, { "id": "displayName", "value": "Cheapest (TRY, 2 adults)" },
                  { "id": "custom.cellOptions", "value": { "type": "color-background", "mode": "gradient" } },
                  { "id": "color", "value": { "mode": "continuous-GrYlRd" } }
              ] }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "indexByName": { "airline_logo": 0, "depart_date": 1, "airline": 2, "price": 3 } } }
          ],
          "targets": [
            {
              "refId": "A", "format": "table",
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r.route_id == \"${route}\" and r._field == \"price\")\n  |> group(columns: [\"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"depart_date\"]) |> min()\n  |> group()\n  |> keep(columns: [\"depart_date\", \"airline\", \"airline_logo\", \"_value\"])\n  |> rename(columns: { _value: \"price\" })\n  |> sort(columns: [\"price\"])"
            }
          ]
        }
      ]
    }
  overview.json: |
    {
      "title": "Flight Prices — Overview (all routes)",
      "uid": "flight-overview",
      "schemaVersion": 39,
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "refresh": "15m",
      "templating": {
        "list": [
          {
            "name": "try_per_eur",
            "type": "textbox",
            "label": "TRY per EUR",
            "query": "53",
            "current": {
              "text": "53",
              "value": "53"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "table",
          "title": "All routes — cheapest fare right now (2 adults)",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "route_id"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Route"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "depart_date"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Cheapest date"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "origin"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "From"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "destination"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "To"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "airline"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Airline(s)"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "price"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "suffix: ₺"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  },
                  {
                    "id": "displayName",
                    "value": "Cheapest (TRY)"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "price_eur"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "prefix: €"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  },
                  {
                    "id": "displayName",
                    "value": "Cheapest (EUR)"
                  }
                ]
              },
              { "matcher": { "id": "byName", "options": "airline_logo" }, "properties": [ { "id": "displayName", "value": "Logo" }, { "id": "custom.cellOptions", "value": { "type": "image" } }, { "id": "custom.width", "value": 64 } ] },
              {
                "matcher": {
                  "id": "byName",
                  "options": "booking_url"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Book"
                  },
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Book on Kiwi",
                        "url": "${__value.text}",
                        "targetBlank": true
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "indexByName": {
                  "route_id": 0,
                  "depart_date": 1,
                  "origin": 2,
                  "destination": 3,
                  "airline": 4,
                  "airline_logo": 5,
                  "price": 6,
                  "price_eur": 7,
                  "booking_url": 8
                }
              }
            }
          ],
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "datasource": {
                "type": "influxdb",
                "uid": "influxdb"
              },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"route_id\", \"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"route_id\"]) |> min()\n  |> group()\n  |> keep(columns: [\"route_id\", \"depart_date\", \"origin\", \"destination\", \"airline\", \"airline_logo\", \"booking_url\", \"_value\"])\n  |> rename(columns: { _value: \"price\" })\n  |> map(fn: (r) => ({ r with price_eur: float(v: r.price) / float(v: ${try_per_eur}) }))\n  |> sort(columns: [\"route_id\"])"
            }
          ]
        },
        {
          "type": "barchart",
          "title": "Cheapest fare now by route (TRY, 2 adults)",
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "suffix: ₺",
              "decimals": 0
            }
          },
          "options": {
            "xField": "route_id",
            "orientation": "horizontal",
            "showValue": "always"
          },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "datasource": {
                "type": "influxdb",
                "uid": "influxdb"
              },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: -3h)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"route_id\", \"depart_date\", \"airline\"]) |> last()\n  |> group(columns: [\"route_id\"]) |> min()\n  |> group()\n  |> keep(columns: [\"route_id\", \"_value\"])\n  |> rename(columns: { _value: \"price\" })\n  |> sort(columns: [\"route_id\"])"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Cheapest-fare trend by route (TRY, 2 adults)",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 19
          },
          "fieldConfig": {
            "defaults": {
              "unit": "suffix: ₺",
              "custom": {
                "drawStyle": "line",
                "showPoints": "auto",
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byFrameRefID",
                  "options": "A"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "${__field.labels.route_id}"
                  }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "last",
                "min"
              ]
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "influxdb",
                "uid": "influxdb"
              },
              "query": "from(bucket: \"flight_prices\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"flight_price\" and r._field == \"price\")\n  |> group(columns: [\"route_id\"])\n  |> aggregateWindow(every: 1h, fn: min, createEmpty: false)"
            }
          ]
        }
      ]
    }

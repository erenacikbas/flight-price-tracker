apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-backups
  namespace: flight-tracker
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 3Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: influxdb-backup
  namespace: flight-tracker
spec:
  schedule: "17 3 * * *" # nightly 03:17 local
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: influxdb:2.7
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  DEST="/backup/$(date +%F_%H%M)"
                  echo "Backing up bucket flight_prices -> $DEST"
                  influx backup "$DEST" \
                    --host http://influxdb.flight-tracker:8086 \
                    --token "$INFLUXDB_TOKEN" --org flights --bucket flight_prices
                  echo "Pruning backups older than 7 days"
                  find /backup -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +
                  echo "Current backups:"; ls -1 /backup
              env:
                - name: INFLUXDB_TOKEN
                  valueFrom:
                    secretKeyRef: { name: flight-tracker-secrets, key: influxdb-token }
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { memory: 256Mi }
              volumeMounts:
                - { name: backups, mountPath: /backup }
          volumes:
            - name: backups
              persistentVolumeClaim: { claimName: influxdb-backups }

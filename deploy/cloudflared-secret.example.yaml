# Template only. Real value is SOPS-encrypted in waitline-infra as cloudflared-token.enc.yaml.
# Token comes from your dedicated Cloudflare Tunnel (Zero Trust > Networks > Tunnels > your
# tunnel > Install connector > the long eyJ... token). This is a SEPARATE tunnel from waitline's.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: grafana
type: Opaque
stringData:
  token: CHANGE_ME_TUNNEL_TOKEN

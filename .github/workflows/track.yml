name: Track flight prices

on:
  schedule:
    # Every 15 minutes. GitHub may delay/skip runs under heavy load;
    # 15 min is the practical floor for reliable scheduled runs.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: flight-tracker
  cancel-in-progress: false

jobs:
  log-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log prices
        run: python logger.py

      - name: Commit updated data
        run: |
          git config user.name "flight-tracker-bot"
          git config user.email "actions@github.com"
          git add data/prices.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "log prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Rebase on any concurrent commits, then push (with a couple of retries).
          for i in 1 2 3; do
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} && \
            git push origin HEAD:${GITHUB_REF_NAME} && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done
